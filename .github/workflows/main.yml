name: Ultimate F1 Database Sync
on:
  workflow_dispatch: # Odpalasz tylko przyciskiem, nic samo się nie psuje

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch Master Driver List
        run: |
          python - <<EOF
          import requests
          import json

          # Używamy surowego pliku z danymi historycznymi (bardziej stabilne niż API)
          url = "https://raw.githubusercontent.com/janduch/f1-data/main/drivers_since_2014.json"
          
          try:
              r = requests.get(url, timeout=20)
              if r.status_code == 200:
                  data = r.json()
                  # Zapisujemy do Twojego pliku
                  with open('kierowcy.json', 'w', encoding='utf-8') as f:
                      json.dump(data, f, indent=4, ensure_ascii=False)
                  print(f"Sukces! Pobrano {len(data)} kierowców.")
              else:
                  print("Błąd serwera z bazą danych.")
                  exit(1)
          except Exception as e:
              print(f"Błąd połączenia: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'F1-Master-Sync'
          git config --global user.email 'bot@f1wordle.com'
          git add kierowcy.json
          git commit -m "Zsynchronizowano pełną bazę 2014-2026" || exit 0
          git push
