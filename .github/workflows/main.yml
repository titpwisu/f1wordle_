name: Generate Historical F1 Database
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # WYMUSZENIE DOSTĘPU

      - name: Fetch Drivers
        run: |
          curl "https://api.jolpi.ca/ergast/f1/drivers.json?limit=200&offset=800" > temp.json
          python3 -c "import json; d=json.load(open('temp.json'))['MRData']['DriverTable']['Drivers']; out=[{'name':f'{x['givenName']} {x['familyName']}', 'code':x.get('code', x['familyName'][:3].upper()), 'nationality':x['nationality'], 'number':int(x.get('permanentNumber',0)), 'debut':int(x['dateOfBirth'].split('-')[0])+20, 'team':'F1 Driver', 'past_teams':[], 'engine':'Hybrid'} for x in d]; json.dump(out, open('kierowcy.json', 'w', encoding='utf-8'), indent=4, ensure_ascii=False)"

      - name: Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add kierowcy.json
          git commit -m "Aktualizacja bazy kierowców" || echo "Brak zmian"
          git push origin main
