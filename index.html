<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Wordle</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <div class="game-container">
        <h1>🏎️ F1 Wordle</h1>
        <p>Guess today's driver!</p>

        <div class="input-area">
            <input type="text" id="driverInput" placeholder="Loading data..." autocomplete="off" disabled>
            <div id="suggestions" class="suggestions-list"></div>
            <button onclick="makeGuess()">GUESS</button>
        </div>

        <div class="board-header">
            <div class="header-row">
                <div>CODE</div>
                <div>NAT</div>
                <div>TEAM</div>
                <div>NUM</div>
                <div>YEAR</div>
                <div>WINS</div>
            </div>
        </div>

        <div id="board"></div>

        <div id="resultModal" class="modal">
            <div class="modal-content">
                <h2 id="modalTitle">RESULT</h2>
                <div id="modalStatusBadge">STATUS</div>
                <p id="modalMessage">Message</p>
                <div id="targetDisplay"></div>

                <button id="closeModalBtn" style="margin-top: 20px; padding: 10px 30px;">CLOSE</button>

                <p style="font-size: 0.8rem; color: #666; margin-top: 20px;">Come back tomorrow for a new driver!</p>
            </div>
        </div>

    </div>
    <script src="script.js?v=8"></script>
</body>
</html>
